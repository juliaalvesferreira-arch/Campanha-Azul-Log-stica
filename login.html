<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campanha de Vendas 2º Semestre – Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #0A0E1A;
  --bg2: #0D1220;
  --surface: #131929;
  --surface2: #1A2235;
  --border: rgba(255,255,255,0.07);
  --text: #E3F2FD;
  --text-muted: #90A4AE;
  --text-faint: #546E7A;
  --accent: #1976D2;
  --accent2: #42A5F5;
  --gold: #FFB300;
  --danger: #EF5350;
  --success: #A5D6A7;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Montserrat',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}

.bg-glow{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(25,118,210,0.25),transparent 70%),
             linear-gradient(180deg,#050810 0%, #0A1628 50%, #0A0E1A 100%);
}

.login-card{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:40px 32px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.login-logo{
  display:block;margin:0 auto 20px;max-width:220px;width:100%;height:auto;
}
.logo-title{
  text-align:center;margin-bottom:8px;
  font-family:'Montserrat',sans-serif;
  font-weight:900;
  font-size:clamp(1.6rem,5vw,2.2rem);
  letter-spacing:1px;
  background:linear-gradient(135deg,#fff 0%,#64B5F6 50%,#1565C0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-sub{
  text-align:center;font-size:0.75rem;color:var(--text-muted);
  letter-spacing:4px;margin-bottom:32px;
}

.form-group{margin-bottom:18px;}
.form-label{
  display:block;font-size:0.78rem;font-weight:600;
  color:var(--text-muted);margin-bottom:6px;letter-spacing:0.5px;
}
.form-input{
  width:100%;padding:12px 14px;border-radius:10px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-family:inherit;font-size:0.92rem;
  transition:border-color 0.2s;
}
.form-input:focus{outline:none;border-color:var(--accent);}
.form-input::placeholder{color:var(--text-faint);}

.btn{
  width:100%;padding:13px 0;border-radius:10px;border:none;
  font-family:inherit;font-weight:700;font-size:0.9rem;
  letter-spacing:0.5px;cursor:pointer;transition:all 0.2s;
  margin-top:6px;
}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
}
.btn-primary:hover{filter:brightness(1.1);}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;}

.divider{
  display:flex;align-items:center;gap:12px;
  margin:24px 0;color:var(--text-faint);font-size:0.78rem;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

.alt-link{
  text-align:center;font-size:0.85rem;color:var(--text-muted);
}
.alt-link a{color:#64B5F6;text-decoration:none;font-weight:600;}
.alt-link a:hover{text-decoration:underline;}

.msg{
  border-radius:10px;padding:12px 14px;font-size:0.82rem;
  margin-bottom:18px;border:1px solid var(--border);
  display:none;line-height:1.4;
}
.msg.show{display:block;}
.msg.error{background:rgba(239,83,80,0.1);border-color:rgba(239,83,80,0.3);color:var(--danger);}
.msg.warn{background:rgba(255,179,0,0.1);border-color:rgba(255,179,0,0.3);color:var(--gold);}
.msg.info{background:rgba(100,181,246,0.1);border-color:rgba(100,181,246,0.3);color:#64B5F6;}

.spinner{
  display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

  <div class="logo-title">Campanha de Vendas</div>
  <div class="logo-sub">2º SEMESTRE · ACESSO RESTRITO</div>

  <div id="msg" class="msg"></div>

  <form id="form-login">
    <div class="form-group">
      <label class="form-label" for="email">E-mail corporativo</label>
      <input class="form-input" type="email" id="email" name="email" placeholder="seunome@voeazul.com.br" required autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label" for="senha">Senha</label>
      <input class="form-input" type="password" id="senha" name="senha" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary" id="btn-login">Entrar</button>
  </form>

  <div class="divider">ainda não tem acesso?</div>

  <div class="alt-link">
    Não possui cadastro? <a href="cadastro.html">Criar conta</a>
  </div>
</div>

<script type="module">
import {
  auth,
  onAuthStateChanged,
  signInWithEmailAndPassword,
  buscarDocumentoUsuario
} from "./firebase-config.js";

const form = document.getElementById("form-login");
const msg = document.getElementById("msg");
const btn = document.getElementById("btn-login");

function mostrarMsg(texto, tipo) {
  msg.textContent = texto;
  msg.className = "msg show " + tipo;
}

function ocultarMsg() {
  msg.className = "msg";
}

// Se o usuário já estiver autenticado, verifica aprovação e redireciona
onAuthStateChanged(auth, async (user) => {
  if (!user) return;
  const dados = await buscarDocumentoUsuario(user.uid);
  if (dados && dados.aprovado === true) {
    window.location.href = "index.html";
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  ocultarMsg();

  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Entrando...';

  try {
    const cred = await signInWithEmailAndPassword(auth, email, senha);
    const dados = await buscarDocumentoUsuario(cred.user.uid);

    if (!dados) {
      mostrarMsg("Cadastro não encontrado. Contate o administrador.", "error");
      btn.disabled = false;
      btn.textContent = "Entrar";
      return;
    }

    if (dados.aprovado !== true) {
      mostrarMsg("Seu cadastro ainda está aguardando aprovação do administrador.", "warn");
      btn.disabled = false;
      btn.textContent = "Entrar";
      return;
    }

    window.location.href = "index.html";

  } catch (err) {
    let texto = "Erro ao entrar. Verifique seus dados.";
    if (err.code === "auth/invalid-credential" || err.code === "auth/wrong-password" || err.code === "auth/user-not-found") {
      texto = "E-mail ou senha incorretos.";
    } else if (err.code === "auth/too-many-requests") {
      texto = "Muitas tentativas. Aguarde alguns minutos e tente novamente.";
    } else if (err.code === "auth/invalid-email") {
      texto = "E-mail inválido.";
    }
    mostrarMsg(texto, "error");
    btn.disabled = false;
    btn.textContent = "Entrar";
  }
});
</script>
